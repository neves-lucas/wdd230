<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Lucas Neves Rocha">
  <meta name="description" content="Chamber of commerce website for MCZ">
  <meta property="og:title" content="MCZ Chamber of Commerce">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://imgmd.net/images/c_limit%2Cw_1200/v1/guia/1573864/maceio.jpg">
  <meta property="og:url" content="https://neves-lucas.github.io/wdd230/chamber/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/medium.css">
  <link rel="stylesheet" href="styles/larger.css">
  <title>MCZ Chamber of Commerce Website</title>
  <link rel="icon" href="images/favicon.ico">
  <script src="scripts/getdates.js" defer></script>
  <script src="scripts/menu.js" defer></script>
  <script src="scripts/darkmode.js" defer></script>
  <script src="scripts/windchill.js" defer></script>
</head>
<body>
    <header>
      <a href="index.html"><img src="images/coconut-tree.webp" alt="MCZ Chamber of Commerce"></a>
      <img src="images/logo.webp" alt="Maceió Chamber of Commerce">
      <nav>
        <button id="menu"></button>
        <div class="navigation">
          <a href="index.html">Home</a>
          <a href="#">About</a>
          <a href="#">Contact</a> 
          <a href="#">Directory</a>
        </div>
      </nav>
      <button
          type="button"
          data-theme-toggle
          aria-label="Change to light theme"></button>
    </header>

    <main>
      <form method="get" action="thankyou.html">

        <fieldset>
          <legend>Applicant Information</legend>
          
          <label for="firstName">First Name* <input type="text" id="fname" name="firstName" required></label>
      
          <label for="lastName">Last Name* <input type="text" id="lname" name="lastName" required></label>
      
          <label for="title">Title/Position <input type="text" id="title" name="title" pattern="[a-zA-Z\-\s]{7,}"></label>
      
          <label for="email">Email* <input type="email" id="email" name="email" placeholder="example@email.com" required></label>
      
          <label for="phone">Phone Number* <input type="tel" id="phone" name="phone" required></label>
        </fieldset>
        
        <fieldset>
          <legend>Organization Information</legend>
      
          <label for="organization">Organization Name</label>
          <input type="text" id="organization" name="organization" required>
      
          <label for="membership">Membership Level</label>
          <select id="membership" name="membership">
            <option value="np">NP Membership</option>
            <option value="bronze">Bronze Membership</option>
            <option value="silver">Silver Membership</option>
            <option value="gold">Gold Membership</option>
          </select>
      
          <label for="description">Organization Description</label>
          <textarea id="description" name="description"></textarea>
        </fieldset>
      
        <input type="hidden" id="timestamp" name="timestamp" value="Tuesday, October 31, 2023">
      
        <input type="submit" value="Submit Application">
      
      </form>
    </main>

    <footer>
      <img src="images/coconut-tree.webp" alt="MCZ Chamber of Commerce">
      <div class="block">
        <h2>Maceió</h2>
        <h4>Chamber of Commerce</h4>
        <p>Av. da Paz, 1109 - Centro, Maceió - AL, 57020-440</p>
      </div>
      <div class="block">
        <p>placeholder@gmail.com</p>
        <p>(82) 99999-9999</p>
        <img src="#" alt="Location icon">
      </div>
      <hr>
      <p>&copy;<span id="year"></span> Maceió Chamber |</p>
      <p><strong> Lucas Neves Rocha </strong></p>
      <p>WDD 230 Project</p>
      <p id="lastModified"></p>
    </footer>
</body>
</html>
