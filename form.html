<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lucas Neves Rocha - WDD 230 - Web Frontend Development - Forms Build">
  <meta name="author" content="Lucas Neves">
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
  <title>Forms build practice</title>
</head>
<body>
    <header>

    </header>

    <main>
      <form method="get" action="record.html">

        <legend>Form Build</legend>
        <p class="smaller">*️⃣ Indicates a required field</p>

        <label for="username" class="req">Username: <input type="text" id="uname" name="username" required></label>

        <label for="password" class="req">Password: <input type="password" id="password" name="password" pattern="[A-Za-z]{8}" placeholder="At least 8 characters long. No numbers." required></label>

        <label for="password2" class="req">Re-enter your Password: <input type="password" id="password2" name="password" pattern="[A-Za-z]{8}" required></label>

        <label for="email" class="req">Email: <input type="email" id="email" name="email" pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" placeholder="example@email.com" title="Please enter a valid email address." required></label>

        <label for="r">Rate us:</label>
        <div id="rangevalue">0</div>
        <input type="range" id="r" name="r" min="1" max="10" value="0" step="1" list="rangevalues">
        <datalist id="rangevalues">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </datalist>

        <input type="submit" value="Submit Application">
      </form>
    </main>

    <footer>

    </footer>
</body>
</html>
